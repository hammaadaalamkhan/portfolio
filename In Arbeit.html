<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seite in Bearbeitung</title>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #eef2f7, #d9e2ec);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: #2c3e50;
        }

        .container {
            background: white;
            padding: 60px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 500px;
        }

        h1 {
            font-size: 2.8em;
            margin-bottom: 10px;
        }

        p {
            color: #6c7a89;
            margin-bottom: 40px;
            font-size: 1.1em;
        }

        .btn {
            text-decoration: none;
            background-color: #2c3e50;
            color: white;
            padding: 14px 30px;
            border-radius: 6px;
            font-size: 1em;
            transition: 0.3s;
            display: inline-block;
        }

        .btn:hover {
            background-color: #1a252f;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
        }
    </style>

</head>

<body>

    <div class="container">

        <h1>Seite in Bearbeitung</h1>

        <p>
            Diese Seite wird aktuell entwickelt.
            Bitte schauen Sie bald wieder vorbei.
        </p>

        <a href="index.html" class="btn">
            ← Zurück zur Startseite
        </a>

    </div>

</body>

</html>
